name: Build & release installers

# Builds the Windows (.exe) and macOS (.dmg) installers on their native
# runners and, when triggered by a version tag, publishes them as a GitHub
# Release. Push a tag like v0.1.0 (or run manually to just build).

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run ${{ matrix.script }}
        env:
          # Unsigned build. To sign/notarize, add certificates as secrets and
          # configure electron-builder (see README).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: warn

  release:
    needs: build
    # Run even if one platform failed, so a good build still ships.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false

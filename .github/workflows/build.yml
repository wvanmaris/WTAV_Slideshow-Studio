name: Build installers

# Builds the Windows (.exe) and macOS (.dmg) installers on their native
# runners. This is how you get a Mac installer without owning a Mac: push a
# tag (or run this workflow manually) and download the artifacts.

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run ${{ matrix.script }}
        env:
          # Unsigned build. To sign/notarize, add certificates as secrets and
          # configure electron-builder (see README).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: ignore
